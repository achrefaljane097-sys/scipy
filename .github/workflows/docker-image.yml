name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Run Python tests
        run: |
          python -m unittest discover -s . -p "*test*.py" || echo "No tests found, skipping"

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build Docker image
        run: |
          docker build -t achrefaljane097/my.app:${{ github.sha }} .
          docker tag achrefaljane097/my.app:${{ github.sha }} achrefaljane097/my.app:latest
      - name: Push Docker image
        run: |
          docker push achrefaljane097/my.app:${{ github.sha }}
          docker push achrefaljane097/my.app:latest
